<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome Screen</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="app">

    <!-- HEADER -->

    <header>

        <div class="logo">

            Mulino del Principe

        </div>

        <div class="header-right">

            <div id="date"></div>

            <div id="clock"></div>

        </div>

    </header>


    <!-- CAROSELLO -->

    <div id="carousel">

        <div id="slideContainer"></div>

    </div>


    <!-- OVERLAY -->

    <div class="overlay">

        <h1>Benvenuto</h1>

        <p>Tocca lo schermo per iniziare</p>

    </div>


    <!-- AREA TOUCH -->

    <div id="touchArea"></div>


    <!-- PROGRESS BAR -->

    <div id="progressBar">

        <div id="progress"></div>

    </div>

</div>

<script src="js/main.js"></script>

</body>

</html>
